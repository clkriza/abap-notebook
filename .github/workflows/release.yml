name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Universal binary (Apple Silicon + Intel)
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

          # Windows — NSIS (.exe) + MSI (.msi)
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ABAP Notebook ${{ github.ref_name }}'
          releaseBody: |
            ## ABAP Notebook ${{ github.ref_name }}

            SAP / ABAP geliştiricileri için masaüstü dokümantasyon aracı.

            ### 📥 İndirme

            | Platform | Dosya | Açıklama |
            |----------|-------|----------|
            | macOS | `.dmg` | Universal — Apple Silicon & Intel |
            | Windows | `.msi` | Windows Installer (önerilen) |
            | Windows | `.exe` | NSIS Kurulum Sihirbazı |

            ### Kurulum

            **macOS:** `.dmg` dosyasını açıp uygulamayı `Applications` klasörüne sürükleyin.
            > İlk açılışta Gatekeeper uyarısı çıkabilir: **Sistem Ayarları → Gizlilik & Güvenlik → Yine de Aç**

            **Windows:** `.msi` veya `.exe` dosyasını çalıştırın.

            ---
            Tüm veriler bilgisayarınızda yerel olarak saklanır. İnternet bağlantısı gerekmez.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
